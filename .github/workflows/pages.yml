name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync package READMEs into site
        run: |
          # Copy each package README as a Jekyll collection page
          packages=(
            "validation:@reso/validation:Isomorphic validation library"
            "odata-expression-parser:@reso/odata-expression-parser:OData filter parser"
            "odata-client:@reso/odata-client:OData client SDK"
            "data-generator:@reso/data-generator:Test data generator"
            "certification:@reso/certification:Certification testing tools"
            "reso-reference-server:reso-reference-server:OData reference server"
          )

          mkdir -p .github/pages/_packages
          for entry in "${packages[@]}"; do
            IFS=':' read -r dir name desc <<< "$entry"

            # Find the README — handle nested structures
            if [ -f "$dir/README.md" ]; then
              readme="$dir/README.md"
            elif [ -f "$dir/server/README.md" ]; then
              readme="$dir/server/README.md"
            else
              continue
            fi

            # Create Jekyll front matter + README content
            cat > ".github/pages/_packages/$dir.md" <<FRONT
          ---
          title: "$name"
          package_name: "$name"
          description: "$desc"
          layout: package
          ---

          FRONT
            cat "$readme" >> ".github/pages/_packages/$dir.md"
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate DD documentation
        run: node .github/pages/dd-generator/generate.mjs
        env:
          TOKEN_URI: ${{ secrets.TOKEN_URI }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          RESO_AGGS_URL: ${{ secrets.RESO_AGGS_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./.github/pages
          destination: ./_site

      - name: Build search index with Pagefind
        run: |
          cp -r ./_site ./_site_searchable
          mkdir -p ./_site_searchable/dd
          cp -r .github/pages/dd-output/* ./_site_searchable/dd/
          npx pagefind --site ./_site_searchable

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site_searchable

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
